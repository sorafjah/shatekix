<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>夏祭り射的　</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width:100%; height:100%;
    overflow:hidden;
    touch-action: manipulation;
    background:#141833;
    font-family:'BIZ UDPGothic', sans-serif;
    -webkit-user-select:none; user-select:none;
    -webkit-touch-callout:none;
  }
  #c { display:block; width:100%; height:100%; touch-action:none; }

  /* ---------- HUD ---------- */
  #hud {
    position:fixed; top:0; left:0; right:0;
    display:flex; justify-content:space-between; align-items:flex-start;
    padding:12px 16px; pointer-events:none; z-index:10;
  }
  .hudCard {
    background:rgba(20,16,30,.72);
    border:2px solid #e8a33d;
    border-radius:12px;
    padding:8px 14px;
    color:#fff2dc;
    min-height:44px;
    display:flex; flex-direction:column; justify-content:center;
  }
  .hudLabel { font-size:11px; letter-spacing:.2em; color:#e8a33d; }
  #scoreVal { font-size:26px; font-weight:700; line-height:1.1; }
  #ammoDots { display:flex; gap:5px; margin-top:4px; }
  .dot {
    width:12px; height:12px; border-radius:50%;
    background:#ffb43a; box-shadow:0 0 6px rgba(255,180,58,.7);
    transition:opacity .2s, transform .2s;
  }
  .dot.used { background:#4a3f55; box-shadow:none; opacity:.5; transform:scale(.75); }

  /* ---------- crosshair ---------- */
  #crosshair {
    position:fixed; width:36px; height:36px;
    margin-left:-18px; margin-top:-18px;
    pointer-events:none; z-index:8; display:none;
  }
  #crosshair::before, #crosshair::after {
    content:''; position:absolute; background:#ffd76a;
    box-shadow:0 0 4px rgba(0,0,0,.6);
  }
  #crosshair::before { left:50%; top:0; width:2px; height:100%; margin-left:-1px; }
  #crosshair::after { top:50%; left:0; height:2px; width:100%; margin-top:-1px; }

  /* ---------- pull gauge ---------- */
  #pullGauge {
    position:fixed; right:18px; bottom:110px;
    width:14px; height:150px;
    background:rgba(20,16,30,.6);
    border:2px solid #e8a33d; border-radius:8px;
    z-index:9; display:none; overflow:hidden;
    pointer-events:none;
  }
  #pullFill {
    position:absolute; left:0; right:0; bottom:0; height:0%;
    background:linear-gradient(to top, #ff6b4a, #ffd76a);
  }

  /* ---------- overlays ---------- */
  .overlay {
    position:fixed; inset:0; z-index:20;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:rgba(12,10,26,.82);
    color:#fff2dc; text-align:center; padding:24px;
  }
  .overlay.hidden { display:none; }
  .bigTitle {
    font-size:min(15vw,84px); font-weight:700; letter-spacing:.18em;
    color:#ffd76a;
    text-shadow:0 0 24px rgba(255,120,60,.55), 0 4px 0 #8a2b1e;
    margin-bottom:10px;
  }
  .subTitle { font-size:16px; color:#f7c9a0; margin-bottom:28px; line-height:1.9; }
  .btn {
    font-family:inherit; font-size:20px; font-weight:700;
    color:#3a1608; background:linear-gradient(#ffd76a,#ffb43a);
    border:none; border-radius:999px;
    padding:16px 44px; min-width:200px; min-height:56px;
    box-shadow:0 6px 0 #b06a12, 0 10px 20px rgba(0,0,0,.4);
    cursor:pointer;
  }
  .btn:active { transform:translateY(3px); box-shadow:0 3px 0 #b06a12; }
  #resultScore { font-size:min(18vw,96px); font-weight:700; color:#ffd76a; line-height:1.2;
    text-shadow:0 0 24px rgba(255,120,60,.5); }
  #resultHits { font-size:18px; color:#f7c9a0; margin:8px 0 30px; }
  .resLabel { font-size:14px; letter-spacing:.3em; color:#e8a33d; }

  /* ---------- score popup ---------- */
  .popup {
    position:fixed; z-index:12; pointer-events:none;
    font-size:26px; font-weight:700; color:#ffd76a;
    text-shadow:0 0 8px rgba(255,110,50,.8), 0 2px 2px rgba(0,0,0,.6);
    animation:popUp .9s ease-out forwards;
  }
  @keyframes popUp {
    0%   { transform:translate(-50%,-50%) scale(.6); opacity:0; }
    15%  { transform:translate(-50%,-70%) scale(1.15); opacity:1; }
    100% { transform:translate(-50%,-160%) scale(1); opacity:0; }
  }
</style>
</head>
<body>
<!-- build: 2026-07-19 -->
<canvas id="c"></canvas>

<div id="hud">
  <div class="hudCard">
    <div class="hudLabel">スコア</div>
    <div id="scoreVal">0</div>
  </div>
  <div class="hudCard">
    <div class="hudLabel">のこりの玉</div>
    <div id="ammoDots"></div>
  </div>
</div>

<div id="crosshair"></div>
<div id="pullGauge"><div id="pullFill"></div></div>

<div id="startOverlay" class="overlay">
  <div class="bigTitle">射　的</div>
  <div class="subTitle">
    パチンコと同じ！<b>飛ばしたい方向と逆向きに</b>指を引いてはなそう。<br>
    （上の棚をねらうときは、下に引くよ）大きく引くほど遠くまで届くよ。玉は10発。
  </div>
  <button id="startBtn" class="btn">あそぶ</button>
</div>

<div id="resultOverlay" class="overlay hidden">
  <div class="resLabel">けっか</div>
  <div id="resultScore">0</div>
  <div id="resultHits"></div>
  <button id="retryBtn" class="btn">もう一度あそぶ</button>
</div>

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js" } }
</script>
<script type="module">
import * as THREE from 'three';

/* =========================================================
   夏祭り射的 — 単一ファイル3Dゲーム
   ・的は内部データモデル（t.fallT / t.swayPhase 等）で駆動する。
     mesh.position/rotation はゲームループ内でデータから毎フレーム再計算される。
     テスト時は __G.targets の fallen / fallT を参照すること。
   ========================================================= */

/* ---------- iPad ズーム防止 ---------- */
document.addEventListener('gesturestart', e => e.preventDefault());
document.addEventListener('touchmove', e => { if (e.touches.length > 1) e.preventDefault(); }, { passive:false });
let lastTouchEnd = 0;
document.addEventListener('touchend', e => {
  const now = Date.now();
  if (now - lastTouchEnd < 300) e.preventDefault();   // 300ms以内の連続タップズームをブロック
  lastTouchEnd = now;
}, { passive:false });

/* ---------- 基本セットアップ ---------- */
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x141833);
scene.fog = new THREE.Fog(0x141833, 15, 40);

const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 100);
camera.position.set(0, 3.5, 10.5);
camera.lookAt(0, 4.2, -6);
scene.add(camera);

addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

/* ---------- ライティング（夜の縁日） ---------- */
scene.add(new THREE.AmbientLight(0x30365e, 1.25));
const warmA = new THREE.PointLight(0xffb45a, 80, 34, 1.5); warmA.position.set(-3.0, 5.2, 1.0); scene.add(warmA);
const warmB = new THREE.PointLight(0xff9a3c, 80, 34, 1.5); warmB.position.set( 3.0, 5.2, 1.0); scene.add(warmB);
const warmC = new THREE.PointLight(0xffc878, 75, 34, 1.5); warmC.position.set( 0, 8.6, 1.0); scene.add(warmC);
const fill  = new THREE.DirectionalLight(0x8090ff, 0.4); fill.position.set(0, 8, 8); scene.add(fill);

/* ---------- 屋台の造作 ---------- */
const woodMat = new THREE.MeshStandardMaterial({ color:0x8a5a33, roughness:0.85 });
const darkWood = new THREE.MeshStandardMaterial({ color:0x5e3c22, roughness:0.9 });

// 背景幕
const back = new THREE.Mesh(new THREE.PlaneGeometry(18, 18),
  new THREE.MeshStandardMaterial({ color:0x5a1f2e, roughness:1 }));
back.position.set(0, 6, -10.5); scene.add(back);

// 地面
const ground = new THREE.Mesh(new THREE.PlaneGeometry(40, 40),
  new THREE.MeshStandardMaterial({ color:0x2a2438, roughness:1 }));
ground.rotation.x = -Math.PI/2; scene.add(ground);

// 手前カウンター
const counter = new THREE.Mesh(new THREE.BoxGeometry(10, 0.9, 1.2), woodMat);
counter.position.set(0, 0.45, 4.2); scene.add(counter);

// 的の棚：本棚のように4段、上から下まで広く使う（奥行きはすべて同じSHELF_Z）
const SHELF_Z = -7.4;
const TIERS = [
  { y: 0.75, size:0.75, points:10 },   // 1段目：一番下・大きめ・低得点
  { y: 2.75, size:0.68, points:15 },   // 2段目
  { y: 4.75, size:0.62, points:25 },   // 3段目
  { y: 6.75, size:0.55, points:35 },   // 4段目：一番上・小さめ・高得点
];
for (const tier of TIERS) {
  // 棚板：的の足元より少し下に置く（的が板の上に少し余裕を持って乗る）
  const deckY = tier.y - 0.06;
  const shelf = new THREE.Mesh(new THREE.BoxGeometry(12.6, 0.18, 1.5), woodMat);
  shelf.position.set(0, deckY - 0.09, SHELF_Z);
  scene.add(shelf);
  // 棚板の前縁（低い縁）
  const front = new THREE.Mesh(new THREE.BoxGeometry(12.6, 0.15, 0.09),
    new THREE.MeshStandardMaterial({ color:0x6e4526, roughness:0.9 }));
  front.position.set(0, deckY - 0.07, SHELF_Z + 0.68);
  scene.add(front);
  // 両端の縦板（本棚っぽい枠）
  for (const side of [-1, 1]) {
    const post = new THREE.Mesh(new THREE.BoxGeometry(0.18, 2.0, 1.5), darkWood);
    post.position.set(side * 6.3, deckY + 0.9, SHELF_Z);
    scene.add(post);
  }
}

// 紅白の日よけ（画面上部のフレーミング）
(function makeValance(){
  const g = new THREE.Group();
  for (let i = 0; i < 12; i++) {
    const m = new THREE.Mesh(new THREE.PlaneGeometry(1.0, 1.1),
      new THREE.MeshStandardMaterial({ color: i%2 ? 0xeeeeee : 0xd23a3a, roughness:1, side:THREE.DoubleSide }));
    m.position.set(-5.5 + i*1.0 + 0.5, 0, 0);
    g.add(m);
  }
  g.position.set(0, 9.4, 1.4);
  g.rotation.x = -0.35;
  scene.add(g);
})();

// 提灯の列
const lanterns = [];
(function makeLanterns(){
  const geo = new THREE.SphereGeometry(0.28, 12, 10);
  geo.scale(1, 0.8, 1);
  for (let i = 0; i < 7; i++) {
    const x = -4.2 + i * 1.4;
    const mat = new THREE.MeshStandardMaterial({
      color:0xff7a3c, emissive:0xff6a26, emissiveIntensity:1.6, roughness:0.6 });
    const m = new THREE.Mesh(geo, mat);
    m.position.set(x, 8.9 + Math.sin(i*1.7)*0.08, 0.4);
    scene.add(m); lanterns.push(m);
  }
})();

/* ---------- 的（ターゲット） ----------
   内部データモデル駆動：
   t = { basePos:Vector3, radius, points, fallen, fallT(0..1),
         swayPhase, motif, group }
   毎フレーム group.rotation.x = -easeFall(fallT)*PI/2 を再計算。 */
const targets = [];
let prizeCount = 0;   // 景品棚に乗せた個数（スロット割り当て用）
const MOTIFS = ['daruma', 'box', 'balloon', 'car', 'plush'];

function buildMotif(motif, size) {
  const g = new THREE.Group();
  if (motif === 'daruma') {
    const body = new THREE.Mesh(new THREE.SphereGeometry(size, 18, 14),
      new THREE.MeshStandardMaterial({ color:0xd23a2a, roughness:0.55 }));
    body.scale.y = 1.12; body.position.y = size * 1.05; g.add(body);
    const face = new THREE.Mesh(new THREE.CircleGeometry(size*0.5, 16),
      new THREE.MeshStandardMaterial({ color:0xffe8cf, roughness:0.8 }));
    face.position.set(0, size*1.15, size*0.96); g.add(face);
  } else if (motif === 'box') {
    const c1 = new THREE.Color().setHSL(Math.random(), 0.65, 0.6);
    const box = new THREE.Mesh(new THREE.BoxGeometry(size*1.6, size*1.9, size*1.0),
      new THREE.MeshStandardMaterial({ color:c1, roughness:0.7 }));
    box.position.y = size*0.95; g.add(box);
    const ribbon = new THREE.Mesh(new THREE.BoxGeometry(size*1.65, size*0.35, size*1.05),
      new THREE.MeshStandardMaterial({ color:0xfff0d0, roughness:0.7 }));
    ribbon.position.y = size*0.95; g.add(ribbon);
  } else if (motif === 'balloon') {
    const c = new THREE.Color().setHSL(Math.random(), 0.75, 0.68);
    const b = new THREE.Mesh(new THREE.SphereGeometry(size, 18, 14),
      new THREE.MeshStandardMaterial({ color:c, roughness:0.25, metalness:0.1 }));
    b.scale.y = 1.15; b.position.y = size*1.4; g.add(b);
    const knot = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, size*0.5),
      new THREE.MeshStandardMaterial({ color:0xdddddd }));
    knot.position.y = size*0.35; g.add(knot);
    g.userData.popColor = c.getHex();   // 割れた時のパーティクル色に使う
  } else if (motif === 'plush') {
    const fur = new THREE.Color().setHSL(0.08 + Math.random()*0.07, 0.5, 0.58);
    const mat = new THREE.MeshStandardMaterial({ color:fur, roughness:0.95 });
    const body = new THREE.Mesh(new THREE.SphereGeometry(size*0.62, 16, 12), mat);
    body.position.y = size*0.62; g.add(body);
    const head = new THREE.Mesh(new THREE.SphereGeometry(size*0.46, 16, 12), mat);
    head.position.y = size*1.5; g.add(head);
    const earGeo = new THREE.SphereGeometry(size*0.16, 10, 8);
    const earL = new THREE.Mesh(earGeo, mat); earL.position.set(-size*0.34, size*1.86, 0.02); g.add(earL);
    const earR = new THREE.Mesh(earGeo, mat); earR.position.set(size*0.34, size*1.86, 0.02); g.add(earR);
    const muzzle = new THREE.Mesh(new THREE.SphereGeometry(size*0.2, 10, 8),
      new THREE.MeshStandardMaterial({ color:0xffe8cf, roughness:0.9 }));
    muzzle.position.set(0, size*1.4, size*0.36); g.add(muzzle);
    const eyeGeo = new THREE.SphereGeometry(size*0.045, 6, 6);
    const eyeMat = new THREE.MeshStandardMaterial({ color:0x241a12, roughness:0.6 });
    const eyeL = new THREE.Mesh(eyeGeo, eyeMat); eyeL.position.set(-size*0.14, size*1.56, size*0.4); g.add(eyeL);
    const eyeR = new THREE.Mesh(eyeGeo, eyeMat); eyeR.position.set(size*0.14, size*1.56, size*0.4); g.add(eyeR);
  } else { // car（ミニカー）
    const bodyColor = new THREE.Color().setHSL(Math.random(), 0.65, 0.55);
    const bodyMat = new THREE.MeshStandardMaterial({ color:bodyColor, roughness:0.4, metalness:0.25 });
    const body = new THREE.Mesh(new THREE.BoxGeometry(size*1.7, size*0.55, size*0.85), bodyMat);
    body.position.y = size*0.5; g.add(body);
    const cabin = new THREE.Mesh(new THREE.BoxGeometry(size*0.9, size*0.42, size*0.72), bodyMat);
    cabin.position.set(-size*0.12, size*0.85, 0); g.add(cabin);
    const wheelGeo = new THREE.CylinderGeometry(size*0.22, size*0.22, size*0.18, 14);
    const wheelMat = new THREE.MeshStandardMaterial({ color:0x232323, roughness:0.85 });
    const wheelSpots = [
      [-size*0.55, size*0.22,  size*0.48], [size*0.55, size*0.22,  size*0.48],
      [-size*0.55, size*0.22, -size*0.48], [size*0.55, size*0.22, -size*0.48],
    ];
    for (const [wx, wy, wz] of wheelSpots) {
      const wheel = new THREE.Mesh(wheelGeo, wheelMat);
      wheel.rotation.x = Math.PI/2;
      wheel.position.set(wx, wy, wz);
      g.add(wheel);
    }
    const headlightMat = new THREE.MeshStandardMaterial({ color:0xfff4c2, emissive:0xffe89a, emissiveIntensity:0.8 });
    const hl1 = new THREE.Mesh(new THREE.SphereGeometry(size*0.09, 8, 8), headlightMat);
    hl1.position.set(size*0.85, size*0.5, size*0.28); g.add(hl1);
    const hl2 = hl1.clone(); hl2.position.z = -size*0.28; g.add(hl2);
  }
  return g;
}

function spawnTargetAt(tier, x, y = tier.y){
  const motif = MOTIFS[(Math.random()*MOTIFS.length)|0];
  const group = buildMotif(motif, tier.size);
  const basePos = new THREE.Vector3(x, y, SHELF_Z);
  scene.add(group);
  targets.push({
    basePos, radius: tier.size * 1.25, points: tier.points,
    fallen:false, fallT:0,
    swayPhase: Math.random()*Math.PI*2,
    motif, group,
    centerY: tier.size * 1.1,   // 当たり判定球の中心高さ
    popColor: group.userData.popColor || 0xffd76a,
    flinch: 0,       // かすった時に短くビクッと震える演出用タイマー
    collectDelay: 0.45, collectT: 0, collected: false,   // 倒した後、自分の方へ回収される演出用
  });
}

function clearTargets(){
  for (const t of targets) {
    if (t.group.parent) t.group.parent.remove(t.group);
  }
  targets.length = 0;
  prizeCount = 0;
}

function makeTargets() {
  // 4段 × 5個 = 20個。すべて同じ奥行き(SHELF_Z)の棚。段ごとに横位置を半分ずらして本棚らしく配置する
  // （間隔は固定。呼び直すたびにモチーフの組み合わせだけ抽選し直す＝毎回同じ場所に同じものが出ない）
  clearTargets();
  const countPerTier = 5;
  const spread = 11.2;
  const slotWidth = spread / countPerTier;
  TIERS.forEach((tier, tierIndex) => {
    const xOffset = (tierIndex % 2) * (slotWidth / 2);
    for (let i = 0; i < countPerTier; i++) {
      let x = -spread/2 + spread * (i + 0.5) / countPerTier + xOffset;
      x = THREE.MathUtils.clamp(x, -spread/2 + tier.size, spread/2 - tier.size);
      spawnTargetAt(tier, x);
    }
  });
  // 段のずらしでできた左端の隙間を埋める（一番上の段／上から3番目の段の一番左）
  spawnTargetAt(TIERS[3], -spread/2 + TIERS[3].size + 0.1);
  spawnTargetAt(TIERS[1], -spread/2 + TIERS[1].size + 0.1);
}
makeTargets();

const easeFall = t => {
  // easeOutQuad + 終端で小さくバウンド
  const q = 1 - (1-t)*(1-t);
  const bounce = t > 0.7 ? Math.sin((t-0.7)/0.3*Math.PI) * 0.06 * (1-t) : 0;
  return Math.min(1, q - bounce);
};

// 命中後の演出バリエーション（'flip'を厚めに、たまに派手な反応を混ぜる）
const HIT_REACTIONS = ['flip', 'flip', 'spinAway', 'sideKnock', 'popUp'];

/* ---------- 銃（カメラに追従） ---------- */
const gun = new THREE.Group();
{
  const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.045, 0.055, 0.9, 12),
    new THREE.MeshStandardMaterial({ color:0xc9a15a, roughness:0.6 }));
  barrel.rotation.x = Math.PI/2; barrel.position.z = -0.45; gun.add(barrel);
  const stock = new THREE.Mesh(new THREE.BoxGeometry(0.09, 0.16, 0.5),
    new THREE.MeshStandardMaterial({ color:0x7a4a26, roughness:0.8 }));
  stock.position.set(0, -0.07, 0.1); stock.rotation.x = 0.25; gun.add(stock);
  const cork = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 0.09, 10),
    new THREE.MeshStandardMaterial({ color:0xb8834f, roughness:0.9 }));
  cork.rotation.x = Math.PI/2; cork.position.z = -0.92; gun.add(cork);
}
gun.position.set(0, -0.42, -1.05);
camera.add(gun);

/* ---------- 自分の景品棚（カメラに追従、画面右下） ---------- */
const prizeShelf = new THREE.Group();
{
  const plank = new THREE.Mesh(new THREE.BoxGeometry(0.62, 0.05, 0.34),
    new THREE.MeshStandardMaterial({ color:0x8a5a33, roughness:0.85 }));
  prizeShelf.add(plank);
  const edge = new THREE.Mesh(new THREE.BoxGeometry(0.62, 0.09, 0.04),
    new THREE.MeshStandardMaterial({ color:0x6e4526, roughness:0.9 }));
  edge.position.set(0, -0.02, 0.15); prizeShelf.add(edge);
}
prizeShelf.position.set(0.72, -0.66, -1.15);
prizeShelf.rotation.set(-0.12, -0.35, 0);
camera.add(prizeShelf);

const PRIZE_SLOTS = 10;   // 弾数と同じ＝最大10個並べられる
function getPrizeSlotLocal(index){
  const col = index % 5, row = Math.floor(index / 5);
  return new THREE.Vector3(-0.22 + col * 0.11, 0.045 + row * 0.09, -0.08 + row * 0.09);
}

// マズルフラッシュ
const flash = new THREE.Mesh(new THREE.SphereGeometry(0.09, 8, 8),
  new THREE.MeshBasicMaterial({ color:0xffe08a, transparent:true, opacity:0 }));
flash.position.set(0, 0, -1.0);
gun.add(flash);
let flashT = 0;

/* ---------- 弾・パーティクル ---------- */
const bullets = [];
const bulletGeo = new THREE.SphereGeometry(0.16, 12, 10);
const bulletMat = new THREE.MeshStandardMaterial({ color:0xd8b06a, roughness:0.8 });
const BULLET_SPEED = 34;

const particles = [];
const partGeo = new THREE.BoxGeometry(0.06, 0.06, 0.06);
function spawnParticles(pos, color, n = 10) {
  for (let i = 0; i < n; i++) {
    const m = new THREE.Mesh(partGeo,
      new THREE.MeshBasicMaterial({ color, transparent:true, opacity:1 }));
    m.position.copy(pos);
    scene.add(m);
    particles.push({
      mesh:m, life:0.6,
      vel:new THREE.Vector3((Math.random()-0.5)*4, Math.random()*3+1, (Math.random()-0.5)*4),
    });
  }
}

// 命中の瞬間に広がって消えるリング（倒した/割った時の派手めの合図）
const hitBursts = [];
const burstGeo = new THREE.RingGeometry(0.5, 0.7, 24);
function spawnHitBurst(pos, color = 0xfff2b0) {
  const m = new THREE.Mesh(burstGeo,
    new THREE.MeshBasicMaterial({ color, transparent:true, opacity:0.95, side:THREE.DoubleSide, depthWrite:false }));
  m.position.copy(pos);
  m.quaternion.copy(camera.quaternion);   // 常にカメラの方を向ける
  scene.add(m);
  hitBursts.push({ mesh:m, life:0.32 });
}

/* ---------- サウンド（Web Audio） ---------- */
let AC = null;
function initAudio(){ if (!AC) AC = new (window.AudioContext || window.webkitAudioContext)(); }
function env(g, t0, a, d){ g.gain.setValueAtTime(0.0001, t0); g.gain.exponentialRampToValueAtTime(a, t0+0.01); g.gain.exponentialRampToValueAtTime(0.0001, t0+d); }
function playFire(pull01){
  if (!AC) return; const t0 = AC.currentTime;
  const nb = AC.createBuffer(1, AC.sampleRate*0.09, AC.sampleRate);
  const d = nb.getChannelData(0);
  for (let i=0;i<d.length;i++) d[i] = (Math.random()*2-1) * (1 - i/d.length);
  const src = AC.createBufferSource(); src.buffer = nb;
  const bp = AC.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value = 1100;
  const g = AC.createGain(); env(g, t0, 0.5 + pull01*0.3, 0.1);
  src.connect(bp).connect(g).connect(AC.destination); src.start(t0);
  const o = AC.createOscillator(); o.type='sine';
  o.frequency.setValueAtTime(300, t0); o.frequency.exponentialRampToValueAtTime(70, t0+0.12);
  const g2 = AC.createGain(); env(g2, t0, 0.4, 0.13);
  o.connect(g2).connect(AC.destination); o.start(t0); o.stop(t0+0.15);
}
function playHit(points){
  if (!AC) return; const t0 = AC.currentTime;
  const base = points >= 30 ? 880 : points >= 20 ? 740 : 620;
  [0, 0.07].forEach((dt, i) => {
    const o = AC.createOscillator(); o.type='square';
    o.frequency.value = base * (i ? 1.5 : 1);
    const g = AC.createGain(); env(g, t0+dt, 0.22, 0.16);
    o.connect(g).connect(AC.destination); o.start(t0+dt); o.stop(t0+dt+0.2);
  });
}
function playFallClack(){
  if (!AC) return; const t0 = AC.currentTime;
  const o = AC.createOscillator(); o.type='triangle';
  o.frequency.setValueAtTime(220, t0); o.frequency.exponentialRampToValueAtTime(90, t0+0.08);
  const g = AC.createGain(); env(g, t0, 0.3, 0.1);
  o.connect(g).connect(AC.destination); o.start(t0); o.stop(t0+0.12);
}
function playPop(){
  if (!AC) return; const t0 = AC.currentTime;
  const nb = AC.createBuffer(1, AC.sampleRate*0.05, AC.sampleRate);
  const d = nb.getChannelData(0);
  for (let i=0;i<d.length;i++) d[i] = (Math.random()*2-1) * (1 - i/d.length);
  const src = AC.createBufferSource(); src.buffer = nb;
  const g = AC.createGain(); env(g, t0, 0.45, 0.06);
  src.connect(g).connect(AC.destination); src.start(t0);
  const o = AC.createOscillator(); o.type='square';
  o.frequency.setValueAtTime(1400, t0); o.frequency.exponentialRampToValueAtTime(300, t0+0.07);
  const g2 = AC.createGain(); env(g2, t0, 0.3, 0.08);
  o.connect(g2).connect(AC.destination); o.start(t0); o.stop(t0+0.09);
}
function playGraze(){
  if (!AC) return; const t0 = AC.currentTime;
  const o = AC.createOscillator(); o.type='triangle';
  o.frequency.setValueAtTime(950, t0); o.frequency.exponentialRampToValueAtTime(500, t0+0.05);
  const g = AC.createGain(); env(g, t0, 0.18, 0.06);
  o.connect(g).connect(AC.destination); o.start(t0); o.stop(t0+0.07);
}
function playCollect(){
  if (!AC) return; const t0 = AC.currentTime;
  [0, 0.06, 0.12].forEach((dt, i) => {
    const o = AC.createOscillator(); o.type='sine';
    o.frequency.value = 660 * Math.pow(1.26, i);
    const g = AC.createGain(); env(g, t0+dt, 0.16, 0.14);
    o.connect(g).connect(AC.destination); o.start(t0+dt); o.stop(t0+dt+0.16);
  });
}
function playMiss(){
  if (!AC) return; const t0 = AC.currentTime;
  const o = AC.createOscillator(); o.type='sine';
  o.frequency.setValueAtTime(140, t0); o.frequency.exponentialRampToValueAtTime(60, t0+0.1);
  const g = AC.createGain(); env(g, t0, 0.25, 0.12);
  o.connect(g).connect(AC.destination); o.start(t0); o.stop(t0+0.14);
}

};
const MAX_PULL = 200;    // フル引き（px）。これだけ引けば狙点が全域に届く

/* ---------- HUD ---------- */

/* ---------- エイム・発射 ---------- */
const raycaster = new THREE.Raycaster();
const aimNDC = new THREE.Vector2(0, 0.15);
const aimWorld = new THREE.Vector3();

function updateAimWorld(){
  raycaster.setFromCamera(aimNDC, camera);
  aimWorld.copy(raycaster.ray.origin).addScaledVector(raycaster.ray.direction, 14);
}

function fire(pull01, extraSpreadDeg = null){
  if (state.phase !== 'play' || state.ammo <= 0) return false;
  state.ammo--;
  updateHUD();
  updateAimWorld();

  const muzzle = new THREE.Vector3();
  flash.getWorldPosition(muzzle);
  let dir = aimWorld.clone().sub(muzzle).normalize();

  // 精度：狙った的の「横幅の2倍」を直径とする円の中のどこかにランダムで着弾する（チート方式）
  if (extraSpreadDeg === null && Math.abs(dir.z) > 1e-4) {
    const tShelf = (SHELF_Z - muzzle.z) / dir.z;
    if (tShelf > 0) {
      const aimPoint = muzzle.clone().addScaledVector(dir, tShelf);   // 照準がSHELF_Zの奥行きに届く点
      // 一番近い（倒れていない）的を探し、その的のサイズを精度の基準にする
      let nearest = null, nearestDist = Infinity;
      for (const t of targets) {
        if (t.fallen) continue;
        const cy = t.basePos.y + t.centerY;
        const d = Math.hypot(aimPoint.x - t.basePos.x, aimPoint.y - cy);
        if (d < nearestDist) { nearestDist = d; nearest = t; }
      }
      const width = nearest ? nearest.radius * 2 : 1.0;      // 直径 ≒ 横幅
      const scatterRadius = width * 0.5;                      // 着弾円の半径＝横幅の0.5倍
      const ang = Math.random() * Math.PI * 2;
      const r = scatterRadius * Math.sqrt(Math.random());     // 円内に均一分布させる
      const landPoint = new THREE.Vector3(
        aimPoint.x + Math.cos(ang) * r,
        aimPoint.y + Math.sin(ang) * r,
        SHELF_Z
      );
      dir = landPoint.sub(muzzle).normalize();
    }
  }

  const m = new THREE.Mesh(bulletGeo, bulletMat);
  m.position.copy(muzzle);
  scene.add(m);
  bullets.push({ mesh:m, dir, prev:muzzle.clone() });

  // 演出
  flashT = 0.12;
  recoil = 0.18 + pull01 * 0.22;
  playFire(pull01);
  return true;
}

/* 弾と的の当たり判定：線分×球（トンネリング防止） */
function segmentHitsSphere(p0, p1, c, r){
  const d = p1.clone().sub(p0);
  const f = p0.clone().sub(c);
  const a = d.dot(d);
  if (a === 0) {
    const dist = Math.sqrt(f.lengthSq());
    return dist <= r ? dist : -1;
  }
  const t = THREE.MathUtils.clamp(-f.dot(d)/a, 0, 1);
  const closest = p0.clone().addScaledVector(d, t);
  const dist = closest.distanceTo(c);
  return dist <= r ? dist : -1;   // 命中していれば中心からの距離、外れていれば-1
}

/* ---------- 入力（Touch Events直接処理） ----------
   Safariがドラッグをパン操作として横取りする問題を避けるため、Pointer Eventsではなく
   touchstart/touchmove/touchend/touchcancelを直接使う。
   狙いは「パチンコ式」：指を引いた向きと逆方向に、引いた量に応じて大きく飛ぶ。
   （手前＝下に引けば逆に奥・上＝棚の方向へ飛ぶ。左右に引けばその逆へ狙いがずれる）
   これにより指1本の現実的なスワイプ量でも、一番下の段から一番上の段まで狙えるようにしている。
   touchmoveが1回も来ない速いフリックでも、touchendの座標だけで発射判定できるようにしている。
   デスクトップ確認用にmouse系イベントも簡易フォールバックとして用意する。 */
let touchStartX = 0, touchStartY = 0, touchCurX = 0, touchCurY = 0;
let aimScreenX = 0, aimScreenY = 0;   // 実際に狙っている画面座標（引いた向きの逆側）
let activeTouchId = null;   // タッチのidentifier、またはマウス操作中は 'mouse'
let ignoreMouseUntil = 0;

function beginAim(id, x, y){
  if (state.phase !== 'play' || activeTouchId !== null) return;
  initAudio();
  activeTouchId = id;
  state.aiming = true;
  touchStartX = x; touchStartY = y;
  touchCurX = x; touchCurY = y;
  state.pull = 0;
  crosshair.style.display = 'block';
  pullGauge.style.display = 'block';
  updateFromPointer();
}
function moveAim(id, x, y){
  if (id !== activeTouchId) return;
  touchCurX = x; touchCurY = y;
  updateFromPointer();
}
function endAim(id, x, y){
  if (id !== activeTouchId) return;
  // moveイベントが一度も来ていなくても、ここで最終座標から引き量・照準を確定させる
  touchCurX = x; touchCurY = y;
  updateFromPointer();
  activeTouchId = null;
  crosshair.style.display = 'none';
  pullGauge.style.display = 'none';
  if (state.aiming) {
    // 指を離したら必ず発射。スワイプ距離(pull)は威力・精度に反映される
    fire(Math.min(1, state.pull / MAX_PULL));
  }
  state.aiming = false;
  state.pull = 0;
}

window.addEventListener('touchstart', e => {
  if (state.phase !== 'play') return;
  const t = e.changedTouches[0];
  beginAim(t.identifier, t.clientX, t.clientY);
  ignoreMouseUntil = Date.now() + 800;   // Safariの合成マウスイベント対策
  e.preventDefault();
}, { passive:false });
window.addEventListener('touchmove', e => {
  if (activeTouchId === null) return;
  for (const t of e.changedTouches) moveAim(t.identifier, t.clientX, t.clientY);
  e.preventDefault();
}, { passive:false });
function touchEndHandler(e){
  if (activeTouchId === null) return;
  for (const t of e.changedTouches) endAim(t.identifier, t.clientX, t.clientY);
  e.preventDefault();
}
window.addEventListener('touchend', touchEndHandler, { passive:false });
window.addEventListener('touchcancel', touchEndHandler, { passive:false });

// マウス操作（PC確認用フォールバック。タッチ直後は無視して二重発火を防ぐ）
window.addEventListener('mousedown', e => {
  if (state.phase !== 'play' || Date.now() < ignoreMouseUntil) return;
  beginAim('mouse', e.clientX, e.clientY);
});
addEventListener('mousemove', e => { if (activeTouchId === 'mouse') moveAim('mouse', e.clientX, e.clientY); });
addEventListener('mouseup', e => { if (activeTouchId === 'mouse') endAim('mouse', e.clientX, e.clientY); });

function updateFromPointer(){
  const dx = touchCurX - touchStartX;
  const dy = touchCurY - touchStartY;
  const dist = Math.hypot(dx, dy);
  state.pull = Math.min(MAX_PULL, dist);
  const norm = Math.min(1, dist / MAX_PULL);          // 0〜1：引いた量の割合
  const dirX = dist > 0.0001 ? dx / dist : 0;
  const dirY = dist > 0.0001 ? dy / dist : 0;
  // 引いた向きと逆方向に、画面のほぼ全域〜棚の一番上を狙えるだけの幅で狙点を動かす
  const rangeX = innerWidth * 1.0;
  const rangeY = innerHeight * 1.9;
  aimScreenX = touchStartX - dirX * norm * rangeX * 0.5;
  aimScreenY = touchStartY - dirY * norm * rangeY * 0.5;
  aimNDC.set((aimScreenX/innerWidth)*2-1, -(aimScreenY/innerHeight)*2+1);
  // クロスヘアの表示自体は画面内に収まるようクランプ（狙点そのものは画面外まで有効）
  crosshair.style.left = THREE.MathUtils.clamp(aimScreenX, 18, innerWidth-18) + 'px';
  crosshair.style.top  = THREE.MathUtils.clamp(aimScreenY, 18, innerHeight-18) + 'px';
  pullFill.style.height = Math.min(100, state.pull/MAX_PULL*100) + '%';
}

/* ---------- テストフック / API ---------- */
const api = {
  // 画面正規化座標(0..1)を指定して1発撃つ。spreadDeg(何か非null値)を渡すと精度チートを無効化して必中にできる
  fireAt(nx, ny, pull01 = 1, spreadDeg = null){
    aimNDC.set(nx*2-1, -(ny*2-1));
    return fire(pull01, spreadDeg);
  },
  reset(){
    state.phase = 'play'; state.ammo = 10; state.score = 0; state.hits = 0;
    state.aiming = false; state.pull = 0; resultTimer = 0; waitingForCollect = false;
    for (const b of bullets) scene.remove(b.mesh);
    bullets.length = 0;
    for (const p of particles) scene.remove(p.mesh);
    particles.length = 0;
    for (const hb of hitBursts) scene.remove(hb.mesh);
    hitBursts.length = 0;
    makeTargets();   // 配置(間隔)は同じまま、モチーフの組み合わせを再抽選して作り直す
    updateHUD();
    startOverlay.classList.add('hidden');
    resultOverlay.classList.add('hidden');
  },
  start(){
    startOverlay.classList.add('hidden');
    state.phase = 'play';
  },
};
window.__G = {
  state, targets, bullets, camera, api,
  frames: 0, elapsed: 0,
};

/* ---------- ゲームループ ---------- */
let last = performance.now();
let recoil = 0;

function tick(now){
  requestAnimationFrame(tick);
  // 120Hz ProMotion対応：dtを1/30秒でクランプ
  const dt = Math.min((now - last) / 1000, 1/30);
  last = now;
  window.__G.frames++;
  window.__G.elapsed += dt;

  /* --- 的：データモデル → 表示を毎フレーム再計算 --- */
  const time = window.__G.elapsed;
  for (const t of targets) {
    if (t.motif === 'balloon' && t.fallen) continue;   // 割れた風船は非表示のまま何もしない
    if (t.collected) continue;   // 景品棚の子になった的はそちらのローカル座標のまま触らない
    if (t.fallen && t.fallT < 1) {
      t.fallT = Math.min(1, t.fallT + dt / 0.42);
      if (t.fallT === 1 && t.reaction !== 'spinAway') playFallClack();
    }
    const sway = t.fallen ? 0 : Math.sin(time*1.6 + t.swayPhase) * 0.05;
    const ft = easeFall(t.fallT);
    const reaction = t.reaction || 'flip';

    if (t.flinch > 0) t.flinch = Math.max(0, t.flinch - dt);
    const flinchWobble = (!t.fallen && t.flinch > 0)
      ? Math.sin(t.flinch * 55) * 0.16 * (t.flinch / 0.28) : 0;

    if (!t.fallen || reaction === 'flip') {
      const hop = t.fallen ? Math.sin(Math.min(1, t.fallT) * Math.PI) * 0.32 : 0;
      t.group.position.set(t.basePos.x, t.basePos.y + hop, t.basePos.z - ft * 0.85);
      t.group.rotation.set(-ft * (Math.PI/2 + 0.35), 0, sway + flinchWobble);
    } else if (reaction === 'spinAway') {
      // 大きく吹っ飛んでくるくる回転しながら遠ざかって消える
      const side = t.knockSide;
      t.group.position.set(
        t.basePos.x + side * ft * 2.4,
        t.basePos.y + Math.sin(Math.min(1, t.fallT) * Math.PI) * 1.1,
        t.basePos.z - ft * 3.2
      );
      t.group.rotation.set(ft * Math.PI * 3, ft * Math.PI * 2.4 * side, ft * Math.PI * side);
      t.group.scale.setScalar(Math.max(0.05, 1 - ft * 0.9));
    } else if (reaction === 'sideKnock') {
      // 横に弾かれて倒れる
      const side = t.knockSide;
      t.group.position.set(
        t.basePos.x + side * ft * 1.4,
        t.basePos.y + Math.sin(Math.min(1, t.fallT) * Math.PI) * 0.16,
        t.basePos.z - ft * 0.35
      );
      t.group.rotation.set(0, 0, -side * ft * (Math.PI/2 + 0.3));
    } else if (reaction === 'popUp') {
      // 高く跳ねてぐらぐらしながら落ちる
      const hop = Math.abs(Math.sin(Math.min(1, t.fallT) * Math.PI * 1.4)) * 0.55;
      t.group.position.set(t.basePos.x, t.basePos.y + hop, t.basePos.z - ft * 0.5);
      t.group.rotation.set(ft * Math.PI * 0.85, 0, Math.sin(t.fallT * 9) * 0.35 * (1 - ft));
    }

    // 倒した的は、少し落ち着いてから自分の景品棚へ弧を描いて飛んでいき、乗って止まる
    // （吹っ飛んで消えるspinAwayと、その場で割れて消える風船はここでは扱わない）
    if (t.fallen && t.fallT >= 1 && t.motif !== 'balloon' && reaction !== 'spinAway' && !t.collected) {
      if (t.collectDelay > 0) {
        t.collectDelay -= dt;
      } else {
        if (t.collectStart === undefined) {
          t.collectStart = t.group.position.clone();
          t.collectSlot = prizeCount++;
        }
        t.collectT = Math.min(1, t.collectT + dt / 0.55);
        const eased = 1 - (1 - t.collectT) * (1 - t.collectT);
        const slotWorld = prizeShelf.localToWorld(getPrizeSlotLocal(t.collectSlot));
        const hopArc = Math.sin(eased * Math.PI) * 1.1;   // 放り投げるような弧
        t.group.position.lerpVectors(t.collectStart, slotWorld, eased);
        t.group.position.y += hopArc;
        t.group.rotation.set(eased * Math.PI * 2.2, eased * Math.PI * 3.0, sway);
        const trophyScale = 0.4;
        t.group.scale.setScalar(1 + (trophyScale - 1) * eased);
        if (t.collectT >= 1) {
          scene.remove(t.group);
          prizeShelf.add(t.group);
          t.group.position.copy(getPrizeSlotLocal(t.collectSlot));
          t.group.rotation.set(0, (Math.random()-0.5) * 0.6, 0);
          t.group.scale.setScalar(trophyScale);
          t.collected = true;
          playCollect();
        }
      }
    }
  }

  /* --- 弾 --- */
  for (let i = bullets.length-1; i >= 0; i--) {
    const b = bullets[i];
    b.prev.copy(b.mesh.position);
    b.mesh.position.addScaledVector(b.dir, BULLET_SPEED * dt);

    let hit = false;
    for (const t of targets) {
      if (t.fallen) continue;
      const c = t.basePos.clone(); c.y += t.centerY;
      const hitDist = segmentHitsSphere(b.prev, b.mesh.position, c, t.radius);
      if (hitDist >= 0) {
        hit = true;
        const ratio = hitDist / t.radius;   // 0=ど真ん中 〜 1=ふちギリギリ
        const graze = ratio > 0.88;         // 円内は面積で分布するため、縁ギリギリだけかするよう高めに設定
        if (graze) {
          t.flinch = 0.28;
          spawnParticles(c, 0xd8d8d8, 6);
          playGraze();
        } else {
          t.fallen = true;
          state.score += t.points;
          state.hits++;
          updateHUD();
          showPopup(c, '+' + t.points);
          if (t.motif === 'balloon') {
            t.fallT = 1;
            t.group.visible = false;          // 風船は倒れずその場で割れて消える
            spawnParticles(c, t.popColor, 18);
            spawnHitBurst(c, t.popColor);
            playPop();
          } else {
            t.reaction = HIT_REACTIONS[(Math.random() * HIT_REACTIONS.length) | 0];
            t.knockSide = Math.random() < 0.5 ? -1 : 1;
            spawnParticles(c, 0xffd76a, 12);
            spawnHitBurst(c, 0xfff2b0);
            playHit(t.points);
          }
        }
        break;
      }
    }
    if (hit || b.mesh.position.z < -10.2 || b.mesh.position.distanceTo(camera.position) > 40) {
      if (!hit && b.mesh.position.z < -10.2) {
        spawnParticles(b.mesh.position, 0x8a6a5a, 6);   // 幕に当たった土ぼこり
        playMiss();
      }
      scene.remove(b.mesh);
      bullets.splice(i, 1);
      checkGameEnd();
    }
  }

  /* --- パーティクル --- */
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.life -= dt;
    p.vel.y -= 9 * dt;
    p.mesh.position.addScaledVector(p.vel, dt);
    p.mesh.material.opacity = Math.max(0, p.life / 0.6);
    if (p.life <= 0) { scene.remove(p.mesh); particles.splice(i, 1); }
  }

  /* --- ヒットバースト（命中リング） --- */
  for (let i = hitBursts.length-1; i >= 0; i--) {
    const hb = hitBursts[i];
    hb.life -= dt;
    const p = 1 - Math.max(0, hb.life / 0.32);
    hb.mesh.scale.setScalar(1 + p * 3.2);
    hb.mesh.material.opacity = Math.max(0, hb.life / 0.32) * 0.95;
    hb.mesh.quaternion.copy(camera.quaternion);
    if (hb.life <= 0) { scene.remove(hb.mesh); hitBursts.splice(i, 1); }
  }

  /* --- 銃 --- */
  updateAimWorld();
  const gunTarget = new THREE.Vector3();
  gun.parent.worldToLocal(gunTarget.copy(aimWorld));
  gun.lookAt(gun.position.clone().add(gunTarget.sub(gun.position).normalize()));
  // 引き動作：手前に下がる＋わずかに上を向く
  const pull01 = Math.min(1, state.pull / MAX_PULL);
  recoil = Math.max(0, recoil - dt * 1.2);
  gun.position.z = -1.05 + pull01 * 0.22 + recoil * 0.5;
  gun.rotation.x += pull01 * 0.08 + recoil * 0.6;

  if (flashT > 0) {
    flashT -= dt;
    flash.material.opacity = Math.max(0, flashT / 0.12);
    flash.scale.setScalar(1 + (0.12 - flashT) * 8);
  }

  /* --- 提灯のゆらぎ --- */
  lanterns.forEach((l, i) => {
    l.material.emissiveIntensity = 1.5 + Math.sin(time*3 + i*2.1) * 0.25;
  });

  /* --- リザルト遷移 --- */
  if (resultTimer > 0) {
    resultTimer -= dt;
    if (resultTimer <= 0 && state.phase === 'play') waitingForCollect = true;
  }
  if (waitingForCollect && state.phase === 'play' && allCollectSettled()) {
    waitingForCollect = false;
    showResult();
  }

  renderer.render(scene, camera);
}
requestAnimationFrame(tick);
</script>
</body>
</html>
